<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <title>Document</title>
</head>
<body>
    <div class="bg-gray-200 w-1/2 p-4 mx-auto mt-4">
        <h1 class="text-2xl font-bold" th:text="${title}"></h1>
        <h2 th:text="${message}"></h2>
        <span th:text="${description}"></span>

        <a th:href="@{https://www.google.com}" target="_blank">Click Here to Open Google</a>

        <h1 class="text-blue-500">
            Hello world!
        </h1>

        <button class="bg-blue-400 px-2 py-2 rounded-2xl" >Click HERE</button>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

</body>
</html>
